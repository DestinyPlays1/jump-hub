var DATA={interview:[{title:'手写 Promise.all',desc:'实现 Promise.all，处理空数组、非Promise值和错误捕获。',source:'字节跳动',answer:'<code>Promise.all</code> 接收可迭代对象，返回新 Promise。全部 resolve 返回结果数组(保持顺序)；任一 reject 则立即拒绝。<br><br>要点：<br>1)空数组&#8594;resolve []<br>2)非 Promise值&#8594;Promise.resolve()包装<br>3)最先 reject 触发',link:'https://developer.mozilla.org/zh-CN/docs/Web/JavaScript/Reference/Global_Objects/Promise/all',hasDiagram:true,diagramType:'flow'},{title:'React useRef 原理',desc:'useRef 如何在多次渲染间保持引用不变？和 createRef 的区别？',source:'大淘宝',answer:'<code>useRef</code> 维护与 Fiber 关联的对象{current:initialValue}，每次渲染复用同一对象。createRef 每次创建新对象，不适合函数组件。<br>useRef 值变化不触发重新渲染。',link:'https://react.dev/reference/react/useRef'},{title:'CSS 层叠上下文',desc:'层叠上下文的创建条件和层叠顺序规则。',source:'腾讯',answer:'创建条件：根元素、position+z-index、opacity&lt;1、transform/filter、isolation:isolate。<br>层叠顺序(从下到上)：background&#8594;负z-index&#8594;block&#8594;float&#8594;inline&#8594;z-index:0&#8594;正z-index',link:'https://developer.mozilla.org/zh-CN/docs/Web/CSS/CSS_positioned_layout/Understanding_z-index/Stacking_context',hasDiagram:true,diagramType:'stack'},{title:'虚拟 DOM diff 策略',desc:'React reconciliation 为什么用 O(n) 启发式？key 的作用？',source:'字节跳动',answer:'两个假设：<br>1)不同类型&#8594;不同树，直接重建<br>2)key 暗示稳定性，列表 O(n) 匹配<br>diff过程：根节点比较&#8594;同类型更新属性&#8594;组件递归&#8594;key 匹配',link:'https://react.dev/learn/render-and-commit',hasDiagram:true,diagramType:'diff'},{title:'浏览器事件循环',desc:'宏任务和微任务的执行顺序？requestAnimationFrame 属于哪类？',source:'字节跳动',answer:'一次 Tick 顺序：<br>1)执行一个宏任务<br>2)清空微任务队列<br>3)requestAnimationFrame<br>4)渲染(style&#8594;layout&#8594;paint)<br>微任务每轮全部清空，宏任务每次只取一个。rAF 既非宏也非微任务。',link:'https://developer.mozilla.org/zh-CN/docs/Web/JavaScript/Event_loop',hasDiagram:true,diagramType:'timeline'},{title:'HTTP/2 多路复用',desc:'HTTP/2 解决了 HTTP/1.1 的哪些问题？队头阻塞还存在吗？',source:'蚂蚁',answer:'HTTP/2：单连接多路复用、二进制分帧、HPACK 压缩。解决 HTTP 级队头阻塞。<br>但 TCP 级队头阻塞仍存在——丢包影响同一连接上所有流。',link:'https://developer.mozilla.org/zh-CN/docs/Web/HTTP/Overview',hasDiagram:true,diagramType:'comparison'},{title:'闭包与内存泄漏',desc:'闭包导致哪些内存泄漏？如何在不破坏功能的前提下释放？',source:'美团',answer:'常见泄漏：闭包引用已移除 DOM、定时器/事件未清理、作用域链保留无关对象。<br>对策：用完置 null、解绑事件、清除定时器、WeakMap/WeakSet。',link:'https://developer.mozilla.org/zh-CN/docs/Web/JavaScript/Closures'},{title:'useEffect 清理函数',desc:'useEffect 的 return 函数什么时候执行？StrictMode 下有何不同？',source:'蚂蚁',answer:'return 函数在组件卸载或依赖变化重执行前执行。<br>StrictMode 开发环境下执行&#8594;清理&#8594;再执行，以暴露副作用 bug。',link:'https://react.dev/reference/react/useEffect'},{title:'前端性能优化',desc:'从 FP/FCP/LCP 到长任务拆分，列举 5 种实操优化手段。',source:'字节跳动',answer:'5 种手段：<br>1)减少关键请求链：内联 CSS/JS<br>2)图片优化：WebP、srcset、懒加载<br>3)代码分割：动态 import、Tree Shaking<br>4)长任务拆分：requestIdleCallback、Web Worker<br>5)缓存策略：Service Worker、CDN',link:'https://web.dev/explore/learn-core-web-vitals'},{title:'WebSocket 与 HTTP 轮询',desc:'WebSocket 的二进制帧格式，与 SSE 的适用场景对比。',source:'腾讯',answer:'短轮询：定时发请求，浪费资源。<br>长轮询：保持连接直到新数据。<br>SSE：单向推送，自动重连。<br>WebSocket：全双工，二进制帧。<br>实时协作&#8594;WebSocket；通知&#8594;SSE；低频&#8594;短轮询',link:'https://developer.mozilla.org/zh-CN/docs/Web/API/WebSockets_API',hasDiagram:true,diagramType:'comparison'}],github:[{title:'shadcn/ui',desc:'可定制的 React 组件库，CLI 将源码直接复制到你的项目。',source:'shadcn'},{title:'screenshot-to-code',desc:'截图&#8594;代码。支持 Tailwind、React、Vue 等。',source:'abi'},{title:'Open Interpreter',desc:'LLM 本地运行 Python/JS/Shell，自然语言操控计算机。',source:'OpenInterpreter'},{title:'Bun',desc:'极速 JS 运行时 + 打包器 + 包管理器，兼容 Node API。',source:'oven-sh'},{title:'LangChain',desc:'构建 LLM 应用的框架：链式调用、代理、记忆。',source:'langchain-ai'},{title:'n8n',desc:'可自托管的自动化工作流工具，可视化编排 API 流水线。',source:'n8n-io'},{title:'Turborepo',desc:'高性能 monorepo 构建系统，增量缓存 + 远程缓存。',source:'vercel'},{title:'Zig',desc:'通用系统编程语言，无 GC、无隐式分配。',source:'ziglang'},{title:'Deno',desc:'现代 JS/TS 运行时，原生支持 TypeScript、Web API。',source:'denoland'},{title:'RustDesk',desc:'开源的远程桌面软件，自托管替代 TeamViewer。',source:'rustdesk'}],news:[{title:'React 19 正式发布',desc:'Actions、新 Hooks、Server Components 稳定版、更好的并发渲染。',source:'React Blog'},{title:'GPT-5 多模态推理能力曝光',desc:'视觉推理、长文本理解和工具使用大幅提升 function renderDiagram(type,item){
  var fns={
    flow:function(){return '<div class="d-head">Promise.all 执行流</div><div class="d-flow"><div class="d-step"><span class="num">1</span><span><strong>输入</strong>：[p1, p2, ...] 可迭代对象</span></div><div class="d-arrow">&darr;</div><div class="d-step"><span class="num green">2</span><span>用 <code>Promise.resolve()</code> 包装所有值</span></div><div class="d-arrow">&darr;</div><div class="d-split"><div class="d-split-box left"><h4>&check; 全部成功</h4><ul><li>结果按输入顺序</li><li>返回 [res1,...]</li></ul></div><div class="d-split-box right"><h4>&#10007; 任一失败</h4><ul><li>最先 reject 触发</li><li>立即拒绝主 Promise</li></ul></div></div><div class="d-arrow">&darr;</div><div class="d-step"><span class="num amber">3</span><span><strong>边界</strong>：空数组 resolve([])</span></div></div>';},
    stack:function(){return '<div class="d-head">CSS 层叠顺序</div><div class="d-layer"><div class="d-layer-item l0"><strong>正 z-index</strong></div><div class="d-layer-item l1"><strong>z-index: 0 / auto</strong></div><div class="d-layer-item l2"><strong>Inline 元素</strong></div><div class="d-layer-item l3"><strong>Float 元素</strong></div><div class="d-layer-item l4"><strong>Block 盒</strong></div><div class="d-layer-item l1"><strong>负 z-index</strong></div><div class="d-layer-item l2"><strong>Background</strong></div></div>';},
    diff:function(){return '<div class="d-head">VDOM Diff</div><div class="d-flow"><div class="d-step"><span class="num">1</span><span>对比根节点：类型不同&#8594;重建</span></div><div class="d-arrow">&darr;</div><div class="d-step"><span class="num green">2</span><span>同类型节点：只更新属性</span></div><div class="d-arrow">&darr;</div><div class="d-step"><span class="num amber">3</span><span>同类型组件：递归 diff</span></div><div class="d-arrow">&darr;</div><div class="d-split"><div class="d-split-box left"><h4>无 key</h4><ul><li>按索引逐一 diff</li><li>插入头部导致整列重建</li></ul></div><div class="d-split-box right"><h4>有 key</h4><ul><li>key 匹配新旧节点</li><li>高效复用 DOM O(n)</li></ul></div></div></div>';},
    timeline:function(){return '<div class="d-head">事件循环 — 一次 Tick</div><div class="d-timeline"><div class="d-tl-item tl-macro"><span class="tl-step">1</span><span class="tl-desc"><strong>宏任务</strong> (script, setTimeout)</span></div><div class="d-tl-item tl-micro"><span class="tl-step">2</span><span class="tl-desc"><strong>微任务</strong> (Promise.then)</span></div><div class="d-tl-item tl-raf"><span class="tl-step">3</span><span class="tl-desc"><strong>rAF</strong></span></div><div class="d-tl-item tl-render"><span class="tl-step">4</span><span class="tl-desc"><strong>渲染</strong> (Style&#8594;Layout&#8594;Paint)</span></div></div>';},
    comparison:function(){return '<div class="d-head">技术对比</div><div class="d-split"><div class="d-split-box left"><h4>HTTP/1.1</h4><ul><li>同一连接串行</li><li>队头阻塞</li><li>文本协议</li></ul></div><div class="d-split-box right"><h4>HTTP/2</h4><ul><li>单连接多路复用</li><li>二进制分帧</li><li>HPACK 压缩</li></ul></div></div>';}
  };

/* ---------- state ---------- */
var currentType='interview',currentItem=null,favorites=JSON.parse(localStorage.getItem('daily-pick-favs')||'[]');
var answerOpen=false,weatherCity='北京';
/* ---------- helpers ---------- */
function getDateKey(){return new Date().toISOString().slice(0,10)}
function seededShuffle(arr,seed){var r=s(seed);var a=[].concat(arr);for(var i=a.length-1;i>0;i--){var j=Math.floor(r()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp}return a}
function s(seed){var h=0;for(var i=0;i<seed.length;i++){h=((h<<5)-h)+seed.charCodeAt(i);h|=0}return function(){h=(h+0x6D2B79F5)|0;var t=Math.imul(h^(h>>>15),1|h);t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296}}
function favKey(item){return item.title}
function isFav(item){return favorites.some(function(f){return f.key===favKey(item)})}
/* ---------- render ---------- */
function render(){
  var type=currentType,today=getDateKey();
  if(type==='news'){renderNewsList(today);return;}
  if(type==='weather'){renderWeather(today);return;}
  if(type==='stocks'){renderStocks(today);return;}
  if(type==='myspace'){renderMySpace(today);return;}
  hideAppMode();renderSingleCard(type,today);
}
function hideAppMode(){
  document.body.classList.remove('news-mode','scroll-mode');
  document.querySelector('.app').classList.remove('news-mode','scroll-mode');
  var nl=document.querySelector('.news-list');if(nl)nl.remove();
  document.getElementById('card').style.display='block';
}
function renderSingleCard(type,today){
  var items=DATA[type],shuffled=seededShuffle(items,today+type);currentItem=shuffled[0];
  var card=document.getElementById('card');card.dataset.type=type;
  var tl={interview:'◆ 面试',github:'◆ 项目',news:'◆ 资讯'};
  var tc={interview:'interview',github:'github',news:'news'};
  if(tc[type]){document.getElementById('tag').textContent=tl[type];document.getElementById('tag').className='tag '+tc[type];document.getElementById('tag').style.display='inline-flex'}
  else{document.getElementById('tag').style.display='none'}
  document.getElementById('cardTitle').textContent=currentItem.title;
  document.getElementById('cardDesc').textContent=currentItem.desc;
  document.getElementById('cardSource').textContent=currentItem.source;
  var aw=document.getElementById('answerWrap');
  if(type==='interview'&&currentItem.answer){aw.style.display='block';document.getElementById('answerBodyInner').innerHTML=currentItem.answer;answerOpen=false;document.getElementById('answerToggle').classList.remove('open');document.getElementById('answerBody').classList.remove('open')}else{aw.style.display='none'}
  var db=document.getElementById('diagramBtn');db.style.display=(type==='interview'&&currentItem.hasDiagram)?'grid':'none';
  document.getElementById('linkBtn').onclick=function(){if(currentItem.link)window.open(currentItem.link,'_blank');else showToast('暂无链接')};
  updateBookmarkUI();updateFavCount();
  document.getElementById('dateLabel').textContent=today.replace(/-/g,' / ')+' · 今日精选';
}
/* ---------- renderNewsList ---------- */
function renderNewsList(today){
  document.body.classList.add('news-mode');document.querySelector('.app').classList.add('news-mode');
  var items=seededShuffle(DATA.news,today+'news');
  var cw=document.getElementById('card-wrap');
  document.getElementById('card').style.display='none';
  var nl=document.querySelector('.news-list');if(nl)nl.remove();
  var list=document.createElement('div');list.className='news-list';
  items.forEach(function(item,i){
    var saved=favorites.some(function(f){return f.key===item.title});
    var card=document.createElement('div');card.className='news-card';
    card.innerHTML='<h4>'+item.title+'</h4><span class="nsrc">'+item.source+'</span><div class="ndesc">'+item.desc+'</div><div class="nbtm"><button class="nbm'+(saved?' saved':'')+'" data-title="'+item.title.replace(/"/g,'&quot;')+'" data-source="'+item.source.replace(/"/g,'&quot;')+'" data-desc="'+item.desc.replace(/"/g,'&quot;')+'">'+(saved?'★':'☆')+'</button><button class="nlnk" data-link="'+(item.link||'')+'">↗ 查看</button></div>';
    list.appendChild(card);
  });
  cw.appendChild(list);
  document.getElementById('dateLabel').textContent=today.replace(/-/g,' / ')+' · 资讯速览';
  updateFavCount();
  cw.querySelectorAll('.nbm').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();var t=this.dataset.title,s=this.dataset.source,d=this.dataset.desc;var k=t;var idx=favorites.findIndex(function(f){return f.key===k});if(idx>-1){favorites.splice(idx,1)}else{favorites.push({key:k,type:'news',title:t,desc:d,source:s,link:''})}localStorage.setItem('daily-pick-favs',JSON.stringify(favorites));render();showToast(idx>-1?'已取消收藏':'★ 已收藏')})});
  cw.querySelectorAll('.nlnk').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();if(this.dataset.link)window.open(this.dataset.link,'_blank')})});
}
/* ---------- renderWeather ---------- */
function renderWeather(today){
  document.body.classList.add('scroll-mode');document.querySelector('.app').classList.add('scroll-mode');
  document.getElementById('card').style.display='none';var nl=document.querySelector('.news-list');if(nl)nl.remove();
  var w=WEATHER[weatherCity];if(!w)return;
  var cw=document.getElementById('card-wrap');
  var html='<div class="weather-card"><div class="city-row">';
  CITIES.forEach(function(c){html+='<button class="city-btn'+(c===weatherCity?' active':'')+'" data-city="'+c+'">'+c+'</button>'});
  html+='</div><div class="w-main"><div class="w-temp">'+w.temp+'°</div><div class="w-cond">'+w.icon+' '+w.cond+'</div></div><div class="w-details"><span>湿度 '+w.humid+'%</span><span>风力 '+w.wind+'</span></div><div class="w-forecast">';
  w.fc.forEach(function(f){html+='<div class="w-fc-item"><div class="w-fc-day">'+f.day+'</div><div class="w-fc-icon">'+w.icon+'</div><div class="w-fc-temp">'+f.lo+'°/'+f.hi+'°</div></div>'});
  html+='</div></div>';
  cw.innerHTML=html;
  document.getElementById('dateLabel').textContent=today.replace(/-/g,' / ')+' · 天气';
  updateFavCount();
  cw.querySelectorAll('.city-btn').forEach(function(btn){btn.addEventListener('click',function(){weatherCity=this.dataset.city;render()})});
}
/* ---------- renderStocks ---------- */
function renderStocks(today){
  document.body.classList.add('scroll-mode');document.querySelector('.app').classList.add('scroll-mode');
  document.getElementById('card').style.display='none';var nl=document.querySelector('.news-list');if(nl)nl.remove();
  var cw=document.getElementById('card-wrap');
  var html='<div class="stock-card"><div class="stock-section-title">指数行情</div><div class="stock-grid">';
  STOCKS.indices.forEach(function(s){html+='<div class="stock-item'+(s.up?' stock-up':' stock-down')+'"><div class="stock-name">'+s.name+'</div><div class="stock-val">'+s.val.toLocaleString()+'</div><div class="stock-chg">'+(s.up?'▲ ':'▼ ')+s.chg+'</div></div>'});
  html+='</div><div class="stock-section-title">热门个股</div><div class="stock-grid">';
  STOCKS.popular.forEach(function(s){html+='<div class="stock-item'+(s.up?' stock-up':' stock-down')+'"><div class="stock-name">'+s.name+'<span style="font-size:10px;color:var(--muted);margin-left:4px">'+s.code+'</span></div><div class="stock-val">'+s.val.toFixed(2)+'</div><div class="stock-chg">'+(s.up?'▲ ':'▼ ')+s.chg+'</div></div>'});
  html+='</div></div>';
  cw.innerHTML=html;
  document.getElementById('dateLabel').textContent=today.replace(/-/g,' / ')+' · 股票';
  updateFavCount();
}
/* ---------- renderMySpace ---------- */
function renderMySpace(today){
  document.body.classList.add('scroll-mode');document.querySelector('.app').classList.add('scroll-mode');
  document.getElementById('card').style.display='none';var nl=document.querySelector('.news-list');if(nl)nl.remove();
  var cw=document.getElementById('card-wrap');
  var intv=favorites.filter(function(f){return f.type==='interview'}).length;
  var git=favorites.filter(function(f){return f.type==='github'}).length;
  var nws=favorites.filter(function(f){return f.type==='news'}).length;
  var total=favorites.length;
  var labels={interview:'面试',github:'项目',news:'资讯'};
  var html='<div class="myspace-card"><div class="ms-profile"><div class="ms-avatar">👤</div><div class="ms-info"><h3>我的精选</h3><p>'+today.replace(/-/g,' / ')+'</p></div></div><div class="ms-stats"><div class="ms-stat"><div class="ms-stat-num">'+total+'</div><div class="ms-stat-label">收藏总数</div></div><div class="ms-stat"><div class="ms-stat-num">'+intv+'</div><div class="ms-stat-label">面试题</div></div><div class="ms-stat"><div class="ms-stat-num">'+git+'</div><div class="ms-stat-label">项目</div></div></div>';
  html+='<div class="ms-section-title">★ 我的收藏</div><div class="ms-fav-list">';
  if(!total){html+='<div class="ms-empty">还没有收藏任何内容</div>'}else{
    favorites.forEach(function(f,i){html+='<div class="ms-fav-item" data-idx="'+i+'"><span class="ms-fav-tag '+f.type+'">'+labels[f.type]+'</span><span class="ms-fav-title">'+f.title+'</span></div>'});
  }
  html+='</div>';
  if(total){html+='<button class="ms-clear" id="clearAllFavs">清空收藏夹</button>'}
  html+='</div>';
  cw.innerHTML=html;
  document.getElementById('dateLabel').textContent=today.replace(/-/g,' / ')+' · 我的空间';
  updateFavCount();
  cw.querySelectorAll('.ms-fav-item').forEach(function(item){item.addEventListener('click',function(){var idx=parseInt(this.dataset.idx);if(idx>=0&&idx<favorites.length){currentType=favorites[idx].type;switchTab(favorites[idx].type);showToast('✓ 已跳转')}})});
  var clr=document.getElementById('clearAllFavs');if(clr)clr.addEventListener('click',function(){if(confirm('确定清空所有收藏？')){favorites=[];localStorage.setItem('daily-pick-favs','[]');render();showToast('已清空')}});
}
/* ---------- UI ---------- */
function updateBookmarkUI(){var btn=document.getElementById('bookmarkBtn');var saved=currentItem&&isFav(currentItem);btn.classList.toggle('bookmarked',saved);btn.innerHTML=saved?'<svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>':'<svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" fill="none"/></svg>';btn.title=saved?'已收藏':'收藏'}
function updateFavCount(){var el=document.getElementById('favCount');el.textContent=favorites.length?'★ '+favorites.length:''}
function renderFavs(){var el=document.getElementById('favList');var lb={interview:'面试',github:'项目',news:'资讯'};document.getElementById('favPanelCount').textContent=favorites.length?'('+favorites.length+')':'';if(!favorites.length){el.innerHTML='<div class="fav-empty"><svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><div>还没有收藏</div></div>';return}el.innerHTML=favorites.map(function(f,i){return'<div class="fav-item" data-key="'+f.key+'"><span class="fav-tag '+f.type+'">'+lb[f.type]+'</span><span class="fav-title">'+f.title+'</span><button class="fav-del" data-idx="'+i+'" title="移除">&times;</button></div>'}).join('');el.querySelectorAll('.fav-item').forEach(function(item){item.addEventListener('click',function(e){if(e.target.closest('.fav-del'))return;var key=this.dataset.key;var found=favorites.find(function(f){return f.key===key});if(found){currentType=found.type;switchTab(found.type);closeFav();showToast('✓ 已跳转')}})});el.querySelectorAll('.fav-del').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();var idx=parseInt(this.dataset.idx);favorites.splice(idx,1);localStorage.setItem('daily-pick-favs',JSON.stringify(favorites));render();renderFavs();showToast('已移除')})})}
function switchTab(type){
  currentType=type;
  document.querySelectorAll('#tabs button').forEach(function(b){b.classList.toggle('active',b.dataset.type===type);b.setAttribute('aria-selected',b.dataset.type===type?'true':'false')});
  if(type==='news'||type==='weather'||type==='stocks'||type==='myspace'){render();return;}
  hideAppMode();render();var card=document.getElementById('card');card.classList.add('swapping');setTimeout(function(){card.classList.remove('swapping')},20);
}
document.getElementById('tabs').addEventListener('click',function(e){var btn=e.target.closest('button');if(btn&&btn.dataset.type&&btn.dataset.type!==currentType)switchTab(btn.dataset.type)});
document.getElementById('answerToggle').addEventListener('click',function(){answerOpen=!answerOpen;this.classList.toggle('open',answerOpen);document.getElementById('answerBody').classList.toggle('open',answerOpen);this.innerHTML=answerOpen?'<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg> 收起答案':'<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg> 看答案'});
document.getElementById('bookmarkBtn').addEventListener('click',function(){if(!currentItem)return;var k=favKey(currentItem);var idx=favorites.findIndex(function(f){return f.key===k});if(idx>-1){favorites.splice(idx,1);showToast('已取消收藏')}else{favorites.push({key:k,type:currentType,title:currentItem.title,desc:currentItem.desc,source:currentItem.source,link:currentItem.link||''});showToast('★ 已收藏')}localStorage.setItem('daily-pick-favs',JSON.stringify(favorites));updateBookmarkUI();updateFavCount()});
document.getElementById('refreshBtn').addEventListener('click',function(){if(currentType==='news'||currentType==='weather'||currentType==='stocks'||currentType==='myspace'){render();showToast('↻ 已刷新');return;}var today=getDateKey();var items=DATA[currentType];var shuffled=seededShuffle(items,today+currentType+Date.now());currentItem=shuffled[0];if(answerOpen){answerOpen=false;document.getElementById('answerToggle').classList.remove('open');document.getElementById('answerBody').classList.remove('open');document.getElementById('answerToggle').innerHTML='<svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg> 看答案'}var card=document.getElementById('card');card.classList.add('swapping');setTimeout(function(){card.classList.remove('swapping');document.getElementById('cardTitle').textContent=currentItem.title;document.getElementById('cardDesc').textContent=currentItem.desc;document.getElementById('cardSource').textContent=currentItem.source;if(currentType==='interview'&&currentItem.answer){document.getElementById('answerWrap').style.display='block';document.getElementById('answerBodyInner').innerHTML=currentItem.answer}else{document.getElementById('answerWrap').style.display='none'}var db=document.getElementById('diagramBtn');db.style.display=(currentType==='interview'&&currentItem.hasDiagram)?'grid':'none';updateBookmarkUI()},20);showToast('↻ 已更换')});
document.getElementById('diagramBtn').addEventListener('click',function(){if(!currentItem||!currentItem.hasDiagram)return;document.getElementById('diagramTitle').innerHTML='⭐ '+currentItem.title+' <span>'+(currentItem.diagramType==='flow'?'流程图':currentItem.diagramType==='stack'?'层叠示意':currentItem.diagramType==='diff'?'Diff过程':currentItem.diagramType==='timeline'?'时间线':'对比图')+'</span>';document.getElementById('diagramBody').innerHTML=renderDiagram(currentItem.diagramType,currentItem);document.getElementById('diagramOverlay').classList.add('open')});
document.getElementById('closeDiagram').addEventListener('click',function(){document.getElementById('diagramOverlay').classList.remove('open')});
document.getElementById('diagramOverlay').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open')});
function openFav(){document.getElementById('favOverlay').classList.add('open');renderFavs()}
function closeFav(){document.getElementById('favOverlay').classList.remove('open')}
document.getElementById('favToggleBtn').addEventListener('click',openFav);
document.getElementById('closeFav').addEventListener('click',closeFav);
document.getElementById('favOverlay').addEventListener('click',function(e){if(e.target===this)closeFav()});
var toastTimer;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(function(){t.classList.remove('show')},1800)}
document.addEventListener('DOMContentLoaded',function(){render();renderFavs()});
</script>
</body>
</html>
